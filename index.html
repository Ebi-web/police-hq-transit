<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>都道府県警察本部 所要時間一覧</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>都道府県警察本部 所要時間一覧</h1>
  <p class="lead">出発地点から47都道府県の警察本部までの電車・新幹線での所要時間を一覧表示します。</p>
</header>

<section id="api-key-panel" class="panel">
  <h2>Google Maps API キー</h2>
  <p>
    このアプリは Google Maps Platform の API（Maps JavaScript API / Places API (New) / Routes API）を使用します。
    キーはブラウザの localStorage にのみ保存され、サーバーには送信されません。
    発行・制限方法は <a href="https://github.com/Ebi-web/police-hq-transit#readme">README</a> を参照してください。
  </p>
  <div class="row">
    <input type="password" id="api-key-input" placeholder="Google Maps API キーを入力">
    <button id="save-api-key">保存して読み込む</button>
    <button id="clear-api-key" class="secondary">削除</button>
  </div>
  <p id="api-key-status" class="status"></p>
</section>

<section id="search-panel" class="panel" hidden>
  <h2>検索条件</h2>
  <div class="row">
    <label>出発地点</label>
    <div id="origin-container" class="autocomplete-container"></div>
  </div>
  <div class="row">
    <label for="departure-input">出発日時</label>
    <input type="datetime-local" id="departure-input">
  </div>
  <div class="row">
    <button id="search-button">所要時間を検索</button>
  </div>
  <p id="search-status" class="status"></p>
</section>

<section id="result-panel" class="panel" hidden>
  <h2>検索結果</h2>
  <table id="result-table">
    <thead>
      <tr>
        <th data-sort="prefecture">都道府県</th>
        <th data-sort="name">警察本部</th>
        <th data-sort="durationValue" class="sortable">所要時間 ▲▼</th>
        <th data-sort="distanceValue" class="sortable">距離 ▲▼</th>
        <th>経路</th>
      </tr>
    </thead>
    <tbody id="result-body"></tbody>
  </table>
</section>

<script src="data/prefectures.js"></script>
<script src="app.js"></script>
</body>
</html>
